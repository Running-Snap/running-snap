# 베스트컷 선정 및 보정 설정
selection_criteria:
  aesthetic_score_threshold: 0.6
  min_photos: 3
  max_photos: 5

  required_elements:
    - clear_subject      # 주제가 명확
    - acceptable_lighting  # 조명이 괜찮음
    - minimal_motion_blur  # 모션블러 적음

  preferred_elements:
    - good_composition   # 구도가 좋음
    - emotional_impact   # 감정적 임팩트
    - unique_moment      # 독특한 순간

  avoid:
    - excessive_motion_blur
    - poor_lighting
    - cluttered_background
    - closed_eyes
    - unflattering_expression

  diversity:
    min_time_gap: 1.0  # 최소 1초 간격
    prefer_varied_compositions: true
    prefer_varied_emotions: true

# 점수 가중치
scoring_weights:
  aesthetic_score: 0.30
  composition_score: 0.25
  emotional_impact: 0.25
  technical_quality: 0.20

# 보정 파이프라인
enhancement_pipeline:
  # 1단계: 기본 보정
  basic_adjustments:
    auto_exposure: true
    auto_white_balance: true
    contrast: 1.10
    highlights: -0.15
    shadows: 0.25
    blacks: 0.05
    whites: -0.05

  # 2단계: 색감 보정
  color_grading:
    vibrance: 0.12
    saturation: 0.05
    tone_curve: "s_curve_gentle"
    split_toning:
      highlights_hue: 45      # 따뜻한 오렌지
      highlights_saturation: 0.08
      shadows_hue: 220        # 차가운 블루
      shadows_saturation: 0.05
      balance: 0.25

  # 3단계: 디테일
  sharpening:
    amount: 0.35
    radius: 1.0
    threshold: 0.02
    masking: 0.25  # 피부 영역 보호

  # 4단계: 비네팅
  vignette:
    amount: -0.15
    midpoint: 0.50
    roundness: 0.0
    feather: 0.50

  # 5단계: 출력
  output:
    format: "jpeg"
    quality: 95
    color_space: "sRGB"

# 스타일별 프리셋
presets:
  sports_action:
    description: "역동적인 스포츠 사진"
    adjustments:
      contrast: 1.20
      clarity: 0.25
      vibrance: 0.18
      highlights: -0.20
      shadows: 0.30
    color:
      temperature: 5800  # 약간 따뜻하게
      tint: 5
    sharpening:
      amount: 0.45

  golden_hour:
    description: "골든아워 느낌"
    adjustments:
      contrast: 1.05
      highlights: -0.25
      shadows: 0.35
      warmth: 0.12
    color:
      temperature: 6500
      orange_saturation: 0.15
    vignette:
      amount: -0.20

  dramatic:
    description: "드라마틱하고 무디한 느낌"
    adjustments:
      contrast: 1.30
      clarity: 0.35
      highlights: -0.30
      shadows: 0.15
      blacks: -0.10
    color:
      saturation: -0.05
      temperature: 5200
    vignette:
      amount: -0.30

  clean_bright:
    description: "깔끔하고 밝은 느낌"
    adjustments:
      contrast: 1.05
      exposure: 0.15
      highlights: -0.10
      shadows: 0.20
      whites: 0.10
    color:
      vibrance: 0.08
      saturation: 0.03
    sharpening:
      amount: 0.30
