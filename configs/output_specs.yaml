# 출력 사양 설정
default:
  video:
    codec: "libx264"
    preset: "medium"
    crf: 23
    audio_codec: "aac"
    audio_bitrate: "192k"

  photo:
    format: "jpeg"
    quality: 95

instagram:
  video:
    # 피드 (정사각형)
    feed_square:
      resolution: [1080, 1080]
      aspect_ratio: "1:1"
      max_duration: 60
      fps: 30
      codec: "libx264"
      crf: 20

    # 피드 (세로)
    feed_portrait:
      resolution: [1080, 1350]
      aspect_ratio: "4:5"
      max_duration: 60
      fps: 30

    # 릴스
    reels:
      resolution: [1080, 1920]
      aspect_ratio: "9:16"
      max_duration: 90
      fps: 30

  photo:
    feed_square:
      resolution: [1080, 1080]
      format: "jpeg"
      quality: 95

    feed_portrait:
      resolution: [1080, 1350]
      format: "jpeg"
      quality: 95

tiktok:
  video:
    resolution: [1080, 1920]
    aspect_ratio: "9:16"
    max_duration: 180
    fps: 30
    codec: "libx264"
    crf: 20

youtube_shorts:
  video:
    resolution: [1080, 1920]
    aspect_ratio: "9:16"
    max_duration: 60
    fps: 30
    codec: "libx264"
    crf: 18

# 품질 프리셋
quality_presets:
  draft:
    description: "빠른 미리보기용"
    video:
      resolution_scale: 0.5
      crf: 28
      preset: "ultrafast"

  standard:
    description: "일반 품질"
    video:
      resolution_scale: 1.0
      crf: 23
      preset: "medium"

  high:
    description: "고품질"
    video:
      resolution_scale: 1.0
      crf: 18
      preset: "slow"
