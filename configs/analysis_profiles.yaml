      - 러너가 없음
      - 러너 크기 < 화면 높이 15%
      - 러너 중심 x < 10% 또는 > 90%

      반드시 아래 JSON 형식으로만 응답 (설명 없이):
      {
        "runner_detected": true/false,
        "runner_center_x": 0.0~1.0,
        "runner_center_y": 0.0~1.0,
