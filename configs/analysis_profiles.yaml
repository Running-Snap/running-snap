# 모든 프로파일 공통 항목
common_analysis:
  - runner_position
  - runner_size
  - pose_quality
  - face_expression
  - aesthetic_scoring

# 로컬 모델용 (Ollama 등 느린 모델)
local_mode:
  max_frames: 5         # 8 → 5 (속도 최적화)
  sample_strategy: "center_biased"  # 중앙 구간 우선
