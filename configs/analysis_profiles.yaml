        "runner_detected": true/false,
        "runner_center_x": 0.0~1.0,
        "runner_center_y": 0.0~1.0,
        "runner_size": 0.0~1.0,
        "limb_spread": 0.0~1.0,
        "face_visible": true/false,
        "face_expression": "positive" | "neutral" | "negative",
        "poster_score": 0.0~1.0,
        "description": "한 줄 설명"
