# 영상 길이별 분석 프로파일
# ─────────────────────────────────────────────────────────────
# 목적: 포스터용 최적 프레임 선별 (컷편집 X, 베스트컷 O)
# Qwen은 "러너가 잘 나온 프레임" 하나를 고르는 것만 담당.
# ─────────────────────────────────────────────────────────────

profiles:
  short:
    duration_range: [0, 10]
    description: "10초 이하 — 포스터 최적 프레임 선별"
    frame_sample_rate: 2   # 초당 2프레임 샘플
    analysis_prompt: |
      이 이미지는 러닝 영상의 한 프레임이다.
      포스터로 쓸 수 있는 최고의 한 장인지 평가해라.

      평가 기준:
      1. 러너 감지: 화면 안에 달리는 사람이 있는가
      2. 위치/크기: 러너가 화면 중앙(x 30~70%, y 20~80%)에 있고 충분히 큰가 (화면 높이의 20% 이상)
      3. 포즈: 달리는 동작이 역동적인가 (팔/다리가 펼쳐짐, 스트라이드 중간 자세)
      4. 표정: 얼굴이 보이면 긍정적(집중·환희·결의)인가
      5. 전체 미학: 배경·조명·구도가 포스터에 어울리는가

      탈락 조건 (poster_score = 0.0 으로 처리):
      - 러너가 없음
      - 러너 크기 < 화면 높이 15%
      - 러너 중심 x < 10% 또는 > 90% (극단적으로 치우침)

      반드시 아래 JSON 형식으로만 응답 (설명 없이):
      {
        "runner_detected": true/false,
        "runner_center_x": 0.0~1.0,
        "runner_center_y": 0.0~1.0,
        "runner_size": 0.0~1.0,
        "limb_spread": 0.0~1.0,
        "face_visible": true/false,
        "face_expression": "positive" | "neutral" | "negative",
        "poster_score": 0.0~1.0,
        "description": "한 줄 설명"
      }

  medium:
    duration_range: [10, 30]
    description: "30초 이하 — 포스터 최적 프레임 선별"
    frame_sample_rate: 1   # 초당 1프레임 샘플
    analysis_prompt: |
      이 이미지는 러닝 영상의 한 프레임이다.
      포스터로 쓸 수 있는 최고의 한 장인지 평가해라.

